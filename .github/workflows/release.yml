name: Release Windows app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-release.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-release.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Download OCR models
        env:
          PYTHONPATH: src
        run: python -m vsparser.download_models

      - name: Build portable app
        shell: powershell
        run: .\build.ps1 -SkipInstall -SkipModels

      - uses: actions/upload-artifact@v4
        with:
          name: Last-War-VS-Scanner-windows-x64
          path: dist/Last-War-VS-Scanner-windows-x64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/Last-War-VS-Scanner-windows-x64.zip
